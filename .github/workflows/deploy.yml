name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "ENV=testing" >> .env
          echo "ALGORITHM=${{ secrets.ALGORITHM }}" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" >> .env
          echo "DATABASE_URL=postgresql://postgres:postgres@db:5432/testdb" >> .env
          echo "DATABASE_URL_TESTING=postgresql://postgres:postgres@db:5432/testdb" >> .env
          echo "RESEND_API=${{ secrets.RESEND_API }}" >> .env
          echo "REDIS_URL=redis://redis:6379" >> .env
          echo "SENTRY_DSN=" >> .env
          echo 'CORS_ORIGINS=["http://localhost:3000"]' >> .env

      - name: Run tests
        run: |
          cp .env .env.test
          docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from api
          docker compose -f docker-compose.test.yml down -v

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/multitenant-backend
            git pull origin master
            docker compose up -d --build
            docker compose exec -T api alembic upgrade head
