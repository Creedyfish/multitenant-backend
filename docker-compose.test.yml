# to run local: docker compose -f docker-compose.test.yml up --abort-on-container-exit
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env.test
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pytest tests/ -v
    volumes:
      - .:/usr/local/app
