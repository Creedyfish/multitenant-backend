services:
  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: pytest tests/ -v
    volumes:
      - .:/usr/local/app
